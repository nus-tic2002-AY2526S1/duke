plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'com.github.johnrengelman.shadow' version '7.1.2'  // Add this line
}

repositories {
    mavenCentral()
}

javafx {
    version = '17.0.2'
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.base' ]
}

mainClassName = 'whisperwind.Launcher'

// Shadow jar configuration
shadowJar {
    archiveBaseName.set('whisperwind')
    archiveClassifier.set('')
    archiveVersion.set('')

    // If you need to merge service files
    mergeServiceFiles()

    // Exclude unnecessary files to reduce size
    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA'
}

// Ensure shadowJar runs during build
assemble.dependsOn shadowJar